    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <!-- CSS personnalisé compilé depuis SCSS -->

<body class="bg-dark text-white">

    <nav class="navbar navbar-expand-lg navbar-light bg-dark shadow-sm border border-bottom border-white">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="principal.html">
                <img src="image/logo.png" alt="Logo" width="120" height="80" class="d-none d-md-block">
                <img src="image/logo.png" alt="Logo" width="60" height="40" class="d-block d-md-none">
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto text-center text-lg-start">
                    <li class="nav-item me-lg-4">
                        <a class="nav-link text-white" href="blog.html">Menu1</a>
                    </li>
                    <li class="nav-item me-lg-4">
                        <a class="nav-link text-white" href="#">Menu2</a>
                    </li>
                    <li class="nav-item me-lg-4">

                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Menu4</a>
                    </li>
                </ul>
                
                <ul class="navbar-nav text-center text-lg-start">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="login.html">
                            <i class="bi bi-person-circle fs-2"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <h1 class="mb-4 text-center">Formulaire</h1>
                <form id="form-publication" class="p-4 border rounded shadow-sm bg-dark border-secondary">

                    <div class="mb-3">
                        <label for="titre" class="form-label">Titre</label>
                        <input type="text" class="form-control" id="titre" required name="titre">
                    </div>
                    <div class="mb-3">
                        <label for="auteur" class="form-label">Auteur</label>
                        <input type="text" class="form-control" id="auteur" required name="auteur">
                    </div>
                    <div class="mb-3">
                        <label for="contenu" class="form-label">Contenu</label>
                        <textarea class="form-control" id="contenu" rows="3" required name="contenu"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="date" class="form-label">Date</label>
                        <input type="text" class="form-control" id="datepicker" required name="date">
                    </div>
                    <button type="submit" class="btn btn-primary">Publier</button>
                    <div id="dialog" title="Basic dialog" style="display:none;">
                        <p>Confirmer la publication du formulaire ?</p>
                    </div>
                </form> 
            </div>
        </div>
    </div>

    <footer class="bg-dark py-4 mt-5 border-top border-white">
        <div class="container text-center text-white">
            <div class="mb-3">
                <a href="#" class="text-white me-4 fs-4"><i class="bi bi-facebook"></i></a>
                <a href="#" class="text-white me-4 fs-4"><i class="bi bi-twitter"></i></a>
                <a href="#" class="text-white fs-4"><i class="bi bi-linkedin"></i></a>

            <p class="mb-1">Centre d'Expertise et de Perfectionnement en Informatique</p>
            <p class="mb-0">2022</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://code.jquery.com/ui/1.14.2/jquery-ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../dist/form.js"></script>
</body>
</html>
