<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap CSS : Framework CSS pour le style et le responsive -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    
    <!-- Bootstrap Icons : Bibliothèque d'icônes -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Google Fonts : Lora pour les titres, Open Sans pour le contenu -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS personnalisé compilé depuis SCSS -->
    <link rel="stylesheet" href="../css/custom.css">
    
    <title>CEPI - Blog</title>
</head>
<body class="bg-dark text-white">

    <!-- NAVBAR (Barre de navigation) -->
    <!-- navbar : Composant de navigation Bootstrap -->
    <!-- navbar-expand-lg : Responsive, devient hamburger menu sur écrans plus petits que lg (992px) -->
    <!-- navbar-light : Style clair pour le texte -->
    <!-- bg-white : Fond blanc -->
    <!-- shadow-sm : Petite ombre portée -->
    <nav class="navbar navbar-expand-lg navbar-light bg-dark shadow-sm border border-bottom border-white">
        <!-- container-fluid : Conteneur pleine largeur -->
        <div class="container-fluid px-4">
            <!-- Logo à gauche -->
            <a class="navbar-brand" href="principal.html">
                <img src="image/logo.png" alt="Logo" width="120" height="80" class="d-none d-md-block">
                <!-- Version plus petite du logo sur mobile -->
                <img src="image/logo.png" alt="Logo" width="60" height="40" class="d-block d-md-none">
            </a>
            
            <!-- Bouton hamburger pour mobile/tablette -->
            <!-- navbar-toggler : Bouton qui apparaît sur écrans plus petits que lg -->
            <!-- data-bs-toggle="collapse" : Active/désactive le menu responsive -->
            <!-- data-bs-target : L'élément à afficher/masquer -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- Menu collapsible (se cache sur mobile/tablette) -->
            <!-- collapse : Se replie sur petits écrans -->
            <!-- navbar-collapse : Composant de collapse pour navbar -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <!-- navbar-nav : Liste de navigation Bootstrap -->
                <!-- mx-auto : Margin auto horizontal (centre l'élément sur grand écran) -->
                <!-- text-center text-lg-start : Centré sur mobile, à gauche sur desktop -->
                <ul class="navbar-nav mx-auto text-center text-lg-start">
                    <!-- nav-item : Item de navigation -->
                    <!-- me-lg-4 : Margin-end niveau 4 uniquement sur grand écran -->
                    <li class="nav-item me-lg-4">
                        <a class="nav-link text-white" href="blog.html">Menu1</a>
                    </li>
                    <li class="nav-item me-lg-4">
                        <a class="nav-link text-white" href="#">Menu2</a>
                    </li>
                    <li class="nav-item me-lg-4">
                        <a class="nav-link text-white" href="#">Menu3</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Menu4</a>
                    </li>
                </ul>
                
                <!-- Icône utilisateur à droite -->
                <!-- text-center text-lg-start : Centré sur mobile, aligné normalement sur desktop -->
                <ul class="navbar-nav text-center text-lg-start">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="login.html">
                            <!-- bi bi-person-circle : Icône Bootstrap Icons -->
                            <!-- fs-2 : Font-size niveau 2 (grande taille) -->
                            <i class="bi bi-person-circle fs-2"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- BARRE DE RECHERCHE ET FILTRE -->
    <!-- container : Conteneur avec largeur max et centré -->
    <!-- my-4 : Margin vertical niveau 4 -->
    <div class="container my-4 bg-dark">
        <!-- row : Ligne du système de grille Bootstrap -->
        <!-- align-items-center : Aligne les éléments verticalement au centre -->
        <!-- g-3 : Gap niveau 3 entre les colonnes (pour le responsive) -->
        <div class="row align-items-center g-3">
            <!-- col-12 col-md-5 : Sur mobile prend 12 col (pleine largeur), sur tablette+ prend 5 col -->
            <div class="col-12 col-md-5">
                <!-- input-group : Groupe d'input Bootstrap -->
                <div class="input-group">
                    <!-- Icône de recherche -->
                    <span class="input-group-text bg-white">
                        <i class="bi bi-search"></i>
                    </span>
                    <!-- form-control : Classe Bootstrap pour inputs -->
                    <input type="text" class="form-control" placeholder="Rechercher...">
                </div>
            </div>
            
            <!-- col-12 col-md-2 : Sur mobile prend 12 col, sur tablette+ prend 2 col -->
            <!-- text-center : Centre le texte -->
            <!-- text-md-center : Centre sur tablette et plus -->
            <div class="col-12 col-md-2 text-center text-md-center">
                <span>Trier par:</span>
            </div>
            
            <!-- col-12 col-md-3 : Sur mobile prend 12 col, sur tablette+ prend 3 col -->
            <div class="col-12 col-md-3">
                <!-- form-select : Classe Bootstrap pour select -->
                <select class="form-select">
                    <option selected>Select</option>
                    <option value="1">Date</option>
                    <option value="2">Titre</option>
                    <option value="3">Popularité</option>
                </select>
            </div>
        </div>
    </div>

    <div class="container my-5 bg-dark">
        <div id="liste-publications" class="row g-4">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Chargement...</span>
                </div>
                <p>Chargement des publications...</p>
            </div>
        </div>
    </div>

    <!-- FOOTER (Pied de page) -->
    <footer class="bg-dark py-4 mt-5 border-top border-white">
        <div class="container text-center text-white">
            <!-- Section des icônes réseaux sociaux -->
            <div class="mb-3">
                <!-- text-dark : Texte/icône noir -->
                <!-- me-4 : Margin-end (droite) niveau 4 -->
                <!-- fs-4 : Font-size niveau 4 -->
                <a href="#" class="text-white me-4 fs-4"><i class="bi bi-facebook"></i></a>
                <a href="#" class="text-white me-4 fs-4"><i class="bi bi-twitter"></i></a>
                <a href="#" class="text-white fs-4"><i class="bi bi-linkedin"></i></a>
            </div>
            <!-- Texte de copyright -->
            <!-- mb-1 : Margin-bottom niveau 1 (petit) -->
            <p class="mb-1">Centre d'Expertise et de Perfectionnement en Informatique</p>
            <!-- mb-0 : Pas de margin bottom -->
            <p class="mb-0">2022</p>
        </div>
    </footer>
    
    <!-- Bootstrap JavaScript Bundle (inclut Popper pour les menus) -->
    <!-- Nécessaire pour les composants interactifs Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../dist/main.js"></script>
</body>
</html>
